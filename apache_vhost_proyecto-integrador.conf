# VirtualHost para proyecto-integrador.local
<VirtualHost *:80>
    ServerName proyecto-integrador.local
    ServerAlias www.proyecto-integrador.local
    DocumentRoot "C:/xampp/htdocs/proyecto parvi pan/proyecto-integrador"
    <Directory "C:/xampp/htdocs/proyecto parvi pan/proyecto-integrador">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog "logs/proyecto-integrador-error.log"
    CustomLog "logs/proyecto-integrador-access.log" common
</VirtualHost>
