<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — ParviPan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
  <link rel="stylesheet" href="css/parvipan.css"/>
</head>
<body>

<div class="pp-login-wrap">
  <div class="pp-login-card">

    <div class="pp-login-logo">
      <div class="pp-login-logo-icon">
        <i class="ti ti-bread" aria-hidden="true"></i>
      </div>
      <p class="pp-login-title">ParviPan</p>
      <p class="pp-login-sub">Sistema de gestión de materia prima</p>
    </div>

    <form id="form-login" novalidate>
      <div class="pp-form-group">
        <label class="pp-form-label" for="inp-usuario">Usuario</label>
        <input class="pp-input" type="text" id="inp-usuario" placeholder="tu.usuario" required autocomplete="username"/>
      </div>
      <div class="pp-form-group">
        <label class="pp-form-label" for="inp-password">Contraseña</label>
        <div class="position-relative">
          <input class="pp-input" type="password" id="inp-password" placeholder="••••••••" required autocomplete="current-password"/>
          <button type="button" id="btn-toggle-pass"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--pp-text-muted);cursor:pointer;padding:0"
            aria-label="Mostrar/ocultar contraseña">
            <i class="ti ti-eye" style="font-size:17px"></i>
          </button>
        </div>
      </div>

      <button class="pp-btn pp-btn-primary pp-btn-full pp-btn-lg mt-3" type="submit">
        <i class="ti ti-login" aria-hidden="true"></i> Ingresar
      </button>
    </form>

    <p class="text-center text-muted mt-4" style="font-size:12px;">
      <i class="ti ti-lock" style="font-size:13px;vertical-align:-1px"></i>
      Acceso exclusivo desde la red interna del local
    </p>

    <!-- Ayuda de demo -->
    <div class="pp-alert pp-alert-info mt-3" style="font-size:12px">
      <i class="ti ti-info-circle"></i>
      <div>
        <strong>Demo:</strong> usa <code>gerente</code>, <code>cocinero</code> o <code>bodega</code> como usuario (cualquier contraseña).
      </div>
    </div>

  </div>
</div>

<script>
  /* Toggle mostrar contraseña */
  document.getElementById("btn-toggle-pass").addEventListener("click", function() {
    const inp = document.getElementById("inp-password");
    const icon = this.querySelector("i");
    if (inp.type === "password") {
      inp.type = "text";
      icon.className = "ti ti-eye-off";
    } else {
      inp.type = "password";
      icon.className = "ti ti-eye";
    }
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/parvipan.js"></script>
</body>
</html>
